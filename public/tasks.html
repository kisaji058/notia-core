<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notia タスク一覧</title>
  <link rel="stylesheet" href="/css/common.css" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  
<div
  id="sheetOverlay"
  class="sheet-overlay"
  hidden
></div>

<div
  id="sheetModal"
  class="sheet-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="sheetTitle"
  hidden
>
  <div class="sheet-header">
    <h3 id="sheetTitle"></h3>

    <button
      id="closeSheetButton"
      type="button"
      aria-label="シートを閉じる"
    >
      ✕
    </button>
  </div>

  <div
    id="sheetContent"
    class="sheet-content"
  ></div>
</div>

  <main class="app">
    <header class="task-header">
  <div class="task-header-text">
    <h1>タスク一覧</h1>
    <p>未完了タスクを確認できます。</p>
  </div>

  <div class="task-header-actions">
  <button
    id="sortButton"
    type="button"
    aria-label="並び替え"
  >
    <span>↕</span>
    <span>並び替え</span>
  </button>

  <button
    id="filterButton"
    type="button"
    aria-label="絞り込み"
  >
    <span>🔍</span>
    <span>絞り込み</span>
  </button>

  <button
    id="settingsButton"
    type="button"
    aria-label="設定"
  >
    <span>⚙</span>
    <span>設定</span>
  </button>
</div>
</header>


  <section class="task-section task-page">
  <div id="taskList">
    <p class="task-status">読み込み中...</p>
  </div>

  <div class="completed-link-area">
    <a
      class="completed-link-button"
      href="/tasks-completed"
    >
      過去50件の完了タスクを見る
      <span aria-hidden="true">›</span>
    </a>
  </div>
</section>

<nav class="bottom-nav">
  <a href="/">
    💬<br>
    チャット
  </a>

  <a href="/tasks"
   class="active">
   
    ✓<br>
    タスク
  </a>

  <a
    href="/calendar">
    📅<br>
    カレンダー
  </a>

  <a href="/routines">
    🔁<br>
    ルーティーン
  </a>
</nav>

<script src="/js/components/cardFactory.js"></script>
<script src="/js/taskUtils.js"></script>
<script src="/js/tasks.js"></script>
</body>
</html>
